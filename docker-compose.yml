version: '3.8'

services:
  # ─── FilmBox Backend ─────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: filmbox-backend
    ports:
      - "8000:8000"
    environment:
      - ENABLE_LLM=${ENABLE_LLM:-true}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - ENV=production
      - DATABASE_URL=sqlite:///./filmBox.db
    restart: unless-stopped

  # ─── Prometheus (Metrics Collector) ──────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: filmbox-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - backend
    restart: unless-stopped

  # ─── Grafana (Dashboards) ───────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: filmbox-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=filmbox123
    depends_on:
      - prometheus
    restart: unless-stopped
